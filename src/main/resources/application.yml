server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: for-pets

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  data:
    redis:
      timeout: 2000ms # redis 장애시 빠른 실패처리
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 2
          max-wait: 1000ms

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus

portone:
  store-id: ${PORTONE_STORE_ID:}
  api-secret: ${PORTONE_API_SECRET:}
