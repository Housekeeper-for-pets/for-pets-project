spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:for_pets}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345678}

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: false
        show_sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret-key: ${JWT_SECRET_KEY:Zm9yLXBldHMtbG9jYWwtand0LXNlY3JldC1rZXQtbXVzdC1iZS0zMi1ieXRlcw==}
  access-token-validity-time: ${JWT_ACCESS_TOKEN_VALIDITY_TIME:3600000}
  refresh-token-validity-time: ${JWT_REFRESH_TOKEN_VALIDITY_TIME:604800000}

logging:
  level:
    root: info
    com.forpets: debug
    org.hibernate.SQL: debug