# 로컬 싱글 인스턴스용
# 실행 예: docker compose up -d mysql redis kafka qdrant app prometheus grafana
global:
  scrape_interval: 1s
  evaluation_interval: 1s

scrape_configs:
  - job_name: 'forpets-local-single'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'for-pets-app:8080'
