# 운영 EC2 멀티 인스턴스용
# Prometheus 컨테이너는 forpets-network에 붙어 있어야 한다.
global:
  scrape_interval: 1s
  evaluation_interval: 1s

scrape_configs:
  - job_name: 'forpets-prod-multi'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'forpets-blue:8080'
          - 'forpets-green:8080'
