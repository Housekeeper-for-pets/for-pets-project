name: CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'         # 마크다운 변경은 CI 스킵
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # 수동 실행 가능

# 중복 실행 최소화 (concurrency): 같은 브랜치 연속 push 시 이전 실행 자동 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    # draft PR은 CI 스킵
    if: github.event.pull_request.draft != true

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 셋업
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      - name: 빌드 + 테스트
        run: ./gradlew build

      - name: 테스트 결과 리포트 (실패해도 실행)
        uses: dorny/test-reporter@v1
        if: success() || failure()  # 빌드 실패해도 리포트는 보여줘
        with:
          name: Test Results
          path: '**/build/test-results/test/TEST-*.xml'
          reporter: java-junit