name: CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read
  checks: write
  pull-requests: write


# 중복 실행 최소화 (concurrency): 같은 브랜치 연속 push 시 이전 실행 자동 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========== Job 1: 빌드 + 테스트 (항상 실행) ==========
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 셋업
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      - name: 빌드 + 테스트
        run: ./gradlew build

  # ========== Job 2: Docker 빌드 + ECR 푸시 (머지 후에만) =========
  push-image:
    name: Push to ECR
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: ECR 로그인
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 빌드 & ECR 푸시
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPO: forpets-backend
          TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPO:$TAG -t $REGISTRY/$REPO:latest .
          docker push $REGISTRY/$REPO:$TAG
          docker push $REGISTRY/$REPO:latest
          echo "✅ 이미지 푸시 완료: $REGISTRY/$REPO:$TAG"

  # ========== Job 3: EC2 배포 (main 머지 후에만) ==========
  deploy:
    name: Deploy to EC2
    needs: push-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: EC2에 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # ECR 로그인
            aws ecr get-login-password --region ap-northeast-2 \
              | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            # 새 이미지 가져오기
            docker pull ${{ secrets.ECR_REGISTRY }}/forpets-backend:latest

            # Nginx와 Spring 컨테이너가 서로 이름으로 통신할 Docker network 준비
            docker network create forpets-network || true

            # Nginx reverse proxy 설정 준비
            mkdir -p /home/ec2-user/nginx
            cat > /home/ec2-user/nginx/default.conf <<'EOF'
            map $http_upgrade $connection_upgrade {
                default upgrade;
                '' close;
            }

            server {
                listen 80;
                server_name _;

                resolver 127.0.0.11 valid=30s ipv6=off;
                set $forpets_app http://forpets:8080;

                client_max_body_size 100m;

                location / {
                    proxy_pass $forpets_app;
                    proxy_http_version 1.1;

                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;

                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection $connection_upgrade;

                    proxy_buffering off;
                    proxy_cache off;
                    add_header X-Accel-Buffering no;

                    proxy_read_timeout 1h;
                    proxy_send_timeout 1h;
                }
            }
            EOF

            # 기존 컨테이너 중지 & 삭제
            docker stop forpets-nginx || true
            docker rm forpets-nginx || true
            docker stop forpets || true
            docker rm forpets || true

            # 새 컨테이너 실행
            docker run -d --name forpets \
              --network forpets-network \
              --restart unless-stopped \
              -v /home/ec2-user/config/application-prod.yml:/app/config/application-prod.yml \
              -e DB_URL="${{ secrets.DB_URL }}" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
              -e JWT_ACCESS_TOKEN_VALIDITY_TIME="${{ secrets.JWT_ACCESS_TOKEN_VALIDITY_TIME }}" \
              -e JWT_REFRESH_TOKEN_VALIDITY_TIME="${{ secrets.JWT_REFRESH_TOKEN_VALIDITY_TIME }}" \            
              -e SPRING_PROFILES_ACTIVE=prod \
              -e SPRING_CONFIG_ADDITIONAL_LOCATION=/app/config/ \
              ${{ secrets.ECR_REGISTRY }}/forpets-backend:latest        

            # Spring 컨테이너가 바로 죽으면 Nginx만 떠서 502가 되므로 여기서 배포를 실패 처리
            sleep 15
            if [ "$(docker inspect -f '{{.State.Running}}' forpets 2>/dev/null)" != "true" ]; then
              echo "❌ Spring 컨테이너 실행 실패"
              docker logs forpets --tail 200 || true
              exit 1
            fi

            # Nginx reverse proxy 실행: 외부 80 -> 내부 Spring 8080
            docker run -d --name forpets-nginx \
              --network forpets-network \
              --restart unless-stopped \
              -p 80:80 \
              -v /home/ec2-user/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro \
              nginx:1.27-alpine
 
            # 헬스체크: 이제 외부 진입점은 Nginx 80번 포트
            sleep 10
            curl -f http://localhost/health || echo "⚠️ 헬스체크 실패"
