name: CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read
  checks: write
  pull-requests: write


# 중복 실행 최소화 (concurrency): 같은 브랜치 연속 push 시 이전 실행 자동 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========= Job 1: 빌드 + 테스트 (항상 실행) ==========
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 셋업
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      - name: 빌드 + 테스트
        run: ./gradlew build

  # ========== Job 2: Docker 빌드 + ECR 푸시 (머지 후에만) =========
  push-image:
    name: Push to ECR
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: ECR 로그인
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 빌드 & ECR 푸시
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPO: forpets-backend
          TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPO:$TAG -t $REGISTRY/$REPO:latest .
          docker push $REGISTRY/$REPO:$TAG
          docker push $REGISTRY/$REPO:latest
          echo "✅ 이미지 푸시 완료: $REGISTRY/$REPO:$TAG"

  # ========== Job 3: EC2 배포 (main 머지 후에만) ==========
  deploy:
    name: Deploy to EC2
    needs: push-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: 운영 compose 파일 업로드
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/prod.conf,monitoring/prometheus-prod.yml,monitoring/grafana/provisioning,monitoring/grafana/dashboards"
          target: "/home/ec2-user/forpets"

      - name: EC2 단일 서버 멀티 인스턴스 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            IMAGE_URI="${{ secrets.ECR_REGISTRY }}/forpets-backend:latest"

            if [ -z "${{ secrets.ECR_REGISTRY }}" ]; then
              echo "❌ ECR_REGISTRY secret이 비어있습니다."
              exit 1
            fi

            if [ -z "${{ secrets.REDIS_HOST }}" ]; then
              echo "❌ REDIS_HOST secret이 비어있습니다. ElastiCache Redis 엔드포인트를 GitHub Secrets에 등록해야 합니다."
              exit 1
            fi

            RAW_REDIS_HOST="${{ secrets.REDIS_HOST }}"
            REDIS_PORT="${{ secrets.REDIS_PORT || '6379' }}"

            # GitHub Secret에 redis://, 포트, 슬래시가 섞여 들어와도 호스트명만 사용한다.
            REDIS_HOST="$RAW_REDIS_HOST"
            REDIS_HOST="$(printf '%s' "$REDIS_HOST" | tr -d '[:space:]' | tr -d '\"' | tr -d "'")"
            REDIS_HOST="${REDIS_HOST#redis://}"
            REDIS_HOST="${REDIS_HOST#rediss://}"
            REDIS_HOST="${REDIS_HOST%%/*}"
            REDIS_HOST="${REDIS_HOST%%:*}"
            REDIS_PORT="$(printf '%s' "$REDIS_PORT" | tr -d '[:space:]')"

            if [ -z "$REDIS_HOST" ]; then
              echo "❌ REDIS_HOST 정규화 실패. ElastiCache 엔드포인트 값을 확인해야 합니다."
              exit 1
            fi

            # Redis endpoint 사전 점검: DNS가 안 풀리면 Secret 값이 잘못된 것이고, TCP가 막히면 보안그룹/VPC 문제다.
            if ! getent hosts "$REDIS_HOST" >/dev/null; then
              echo "❌ REDIS_HOST DNS 해석 실패. ElastiCache의 Primary endpoint 또는 Configuration endpoint 호스트명을 확인해야 합니다."
              exit 1
            fi

            if ! timeout 5 bash -c "cat < /dev/null > /dev/tcp/$REDIS_HOST/$REDIS_PORT"; then
              echo "❌ Redis TCP 연결 실패. ElastiCache 보안그룹 인바운드 6379가 EC2 보안그룹을 허용하는지 확인해야 합니다."
              exit 1
            fi

            # ECR 로그인
            aws ecr get-login-password --region ap-northeast-2 \
              | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            # 새 이미지 가져오기
            docker pull "$IMAGE_URI"

            if ! docker compose version >/dev/null 2>&1; then
              echo "❌ EC2에 Docker Compose 플러그인이 없습니다. docker compose version이 성공해야 합니다."
              exit 1
            fi

            cd /home/ec2-user/forpets

            cat > .env.prod <<EOF
            IMAGE_URI=$IMAGE_URI
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            JWT_ACCESS_TOKEN_VALIDITY_TIME=${{ secrets.JWT_ACCESS_TOKEN_VALIDITY_TIME }}
            JWT_REFRESH_TOKEN_VALIDITY_TIME=${{ secrets.JWT_REFRESH_TOKEN_VALIDITY_TIME }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            PORTONE_STORE_ID=${{ secrets.PORTONE_STORE_ID }}
            PORTONE_API_SECRET=${{ secrets.PORTONE_API_SECRET }}
            QDRANT_BASE_URL=${{ secrets.QDRANT_BASE_URL || 'http://qdrant:6333' }}
            NOTIFICATION_BROKER=${{ secrets.NOTIFICATION_BROKER || 'redis-stream' }}
            REDIS_HOST=$REDIS_HOST
            REDIS_PORT=$REDIS_PORT
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            REDIS_SSL_ENABLED=${{ secrets.REDIS_SSL_ENABLED || 'false' }}
            GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD || 'admin' }}
            EOF

            # 이전 docker run 방식으로 생성한 컨테이너가 남아 있으면 compose가 같은 이름을 사용할 수 없어서 정리한다.
            docker stop forpets || true
            docker rm forpets || true
            docker stop forpets-nginx forpets-blue forpets-green || true
            docker rm forpets-nginx forpets-blue forpets-green || true

            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans

            wait_for_app_health() {
              CONTAINER_NAME="$1"
              HOST_PORT="$2"

              if [ "$(docker inspect -f '{{.State.Running}}' "$CONTAINER_NAME" 2>/dev/null)" != "true" ]; then
                echo "❌ $CONTAINER_NAME 컨테이너 실행 실패"
                docker logs "$CONTAINER_NAME" --tail 200 || true
                return 1
              fi

              for i in $(seq 1 30); do
                if curl -fsS --max-time 2 "http://localhost:$HOST_PORT/health"; then
                  echo "✅ $CONTAINER_NAME health check 성공"
                  return 0
                fi

                echo "⏳ $CONTAINER_NAME health 대기 중... ($i/30)"
                sleep 3
              done

              echo "❌ $CONTAINER_NAME health check 실패"
              docker ps -a
              docker logs "$CONTAINER_NAME" --tail 200 || true
              return 1
            }

            wait_for_app_health forpets-blue 8080
            wait_for_app_health forpets-green 8081

            for i in $(seq 1 10); do
              if curl -fsS --max-time 2 http://localhost/health; then
                echo "✅ Nginx upstream health check 성공"
                exit 0
              fi

              echo "⏳ Nginx upstream health 대기 중... ($i/10)"
              sleep 3
            done

            echo "❌ Nginx upstream health check 실패"
            docker logs forpets-nginx --tail 100 || true
            docker logs forpets-blue --tail 100 || true
            docker logs forpets-green --tail 100 || true
            exit 1
