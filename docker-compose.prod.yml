services:
  nginx:
    image: nginx:1.27-alpine
    container_name: forpets-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - forpets-blue
      - forpets-green

  forpets-blue:
    image: ${IMAGE_URI}
    container_name: forpets-blue
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment: &app-env
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul
      SPRING_PROFILES_ACTIVE: prod,ai
      SERVER_PORT: 8080
      SPRING_CONFIG_ADDITIONAL_LOCATION: /app/config/
      SPRING_NOTIFICATIONS_BROKER: ${NOTIFICATION_BROKER:-redis-stream}
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_TOKEN_VALIDITY_TIME: ${JWT_ACCESS_TOKEN_VALIDITY_TIME}
      JWT_REFRESH_TOKEN_VALIDITY_TIME: ${JWT_REFRESH_TOKEN_VALIDITY_TIME}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PORTONE_STORE_ID: ${PORTONE_STORE_ID}
      PORTONE_API_SECRET: ${PORTONE_API_SECRET}
      QDRANT_BASE_URL: ${QDRANT_BASE_URL:-http://qdrant:6333}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_DATA_REDIS_SSL_ENABLED: ${REDIS_SSL_ENABLED:-false}
    volumes:
      - /home/ec2-user/config/application-prod.yml:/app/config/application-prod.yml:ro
    depends_on:
      - qdrant

  forpets-green:
    image: ${IMAGE_URI}
    container_name: forpets-green
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      <<: *app-env
    volumes:
      - /home/ec2-user/config/application-prod.yml:/app/config/application-prod.yml:ro
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:v1.9.7
    container_name: forpets-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  prometheus:
    image: prom/prometheus
    container_name: forpets-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    volumes:
      - ./monitoring/prometheus-prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana
    container_name: forpets-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  qdrant-data:
  prometheus-data:
  grafana-data:
